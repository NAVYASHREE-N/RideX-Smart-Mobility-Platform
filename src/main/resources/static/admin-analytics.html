<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RideX Analytics</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="css/style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<nav class="navbar">

<div class="logo">
RideX Admin
</div>

<ul class="nav-links">

<li>
<a href="admin-dashboard.html">
Dashboard
</a>
</li>

<li>
<a href="admin-customers.html">
Customers
</a>
</li>

<li>
<a href="admin-drivers.html">
Drivers
</a>
</li>

<li>
<a href="admin-analytics.html">
Analytics
</a>
</li>

</ul>

<div class="nav-actions">

<button class="theme-btn"
onclick="toggleTheme()">

<i class="fa-solid fa-moon"></i>

</button>

<button class="nav-btn"
onclick="logoutAdmin()">

Logout

</button>

</div>

</nav>

<section class="page-header">

<h1>
RideX Analytics
</h1>

<p>
Monitor platform performance and ride analytics.
</p>

</section>

<!-- STATS -->

<section class="stats-grid">

<div class="stats-box">

<h2 id="completedRides">
0
</h2>

<p>
Completed Rides
</p>

</div>

<div class="stats-box">

<h2 id="cancelledRides">
0
</h2>

<p>
Cancelled Rides
</p>

</div>

<div class="stats-box">

<h2 id="activeDrivers">
0
</h2>

<p>
Available Drivers
</p>

</div>

<div class="stats-box">

<h2 id="analyticsRevenue">
₹0
</h2>

<p>
Revenue
</p>

</div>

</section>

<!-- CHARTS -->

<section class="analytics-grid">

<div class="analytics-chart-card">

<h2>
Ride Status Distribution
</h2>

<canvas id="rideChart"></canvas>

</div>

<div class="analytics-chart-card">

<h2>
Revenue Analytics
</h2>

<canvas id="revenueChart"></canvas>

</div>

<div class="analytics-chart-card">

<h2>
Driver Status Overview
</h2>

<canvas id="driverChart"></canvas>

</div>

<div class="analytics-chart-card">

<h2>
Ride Activity
</h2>

<canvas id="activityChart"></canvas>

</div>

</section>

<script>

// TOKEN VALIDATION

const token =
localStorage.getItem(
"token"
);

if(!token){

window.location.href =
"login.html";

}

// LOAD ANALYTICS

async function loadAnalytics(){

const user =
JSON.parse(
localStorage.getItem(
"loggedInUser"
)
);

if(
!user
||
user.role !== "ADMIN"
){

window.location.href =
"login.html";

return;

}

// RIDES

const rideResponse =
await fetch(

"http://localhost:8080/rides",

{
headers:{
"Authorization":
"Bearer " +
localStorage.getItem("token")
}
}

);

const rides =
await rideResponse.json();

// DRIVERS

const driverResponse =
await fetch(

"http://localhost:8080/drivers",

{
headers:{
"Authorization":
"Bearer " +
localStorage.getItem("token")
}
}

);

const drivers =
await driverResponse.json();

// COMPLETED

const completed =
rides.filter(
ride =>
ride.status === "COMPLETED"
);

document.getElementById(
"completedRides"
).innerText =
completed.length;

// CANCELLED

const cancelled =
rides.filter(
ride =>
ride.status === "CANCELLED"
);

document.getElementById(
"cancelledRides"
).innerText =
cancelled.length;

// AVAILABLE

const available =
drivers.filter(
driver =>
driver.status === "AVAILABLE"
);

document.getElementById(
"activeDrivers"
).innerText =
available.length;

// REVENUE

let revenue = 0;

completed.forEach(ride => {

revenue += ride.fare;

});

document.getElementById(
"analyticsRevenue"
).innerText =
"₹" + revenue;

// CHART 1

new Chart(

document.getElementById(
"rideChart"
),

{
type:"doughnut",

data:{

labels:[
"Completed",
"Cancelled",
"In Progress"
],

datasets:[{

data:[

completed.length,

cancelled.length,

rides.filter(
ride =>
ride.status === "IN_PROGRESS"
).length

]

}]

}

}

);

// CHART 2

new Chart(

document.getElementById(
"revenueChart"
),

{
type:"bar",

data:{

labels:[
"Completed",
"Cancelled",
"Total Revenue"
],

datasets:[{

data:[

completed.length * 100,

cancelled.length * 40,

revenue

]

}]

}

}

);

// CHART 3

new Chart(

document.getElementById(
"driverChart"
),

{
type:"pie",

data:{

labels:[
"Available",
"On Trip",
"Offline"
],

datasets:[{

data:[

drivers.filter(
driver =>
driver.status === "AVAILABLE"
).length,

drivers.filter(
driver =>
driver.status === "ON_TRIP"
).length,

drivers.filter(
driver =>
driver.status === "OFFLINE"
).length

]

}]

}

}

);

// CHART 4

new Chart(

document.getElementById(
"activityChart"
),

{
type:"line",

data:{

labels:[
"Mon",
"Tue",
"Wed",
"Thu",
"Fri",
"Sat",
"Sun"
],

datasets:[{

label:"Ride Activity",

data:[

12,
19,
10,
15,
22,
30,
25

],

fill:false,
tension:0.4

}]

}

}

);

}

// LOGOUT

function logoutAdmin(){

localStorage.removeItem(
"loggedInUser"
);

localStorage.removeItem(
"token"
);

window.location.href =
"login.html";

}

// LOAD

loadAnalytics();

// LOAD THEME

if(
localStorage.getItem("theme")
=== "dark"
){

document.body.classList.add(
"dark-mode"
);

}

// TOGGLE

function toggleTheme(){

document.body.classList.toggle(
"dark-mode"
);

if(
document.body.classList.contains(
"dark-mode"
)
){

localStorage.setItem(
"theme",
"dark"
);

}

else{

localStorage.setItem(
"theme",
"light"
);

}

}

</script>

</body>

</html>
