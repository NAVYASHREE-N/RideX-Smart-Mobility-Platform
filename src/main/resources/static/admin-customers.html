<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>RideX Customers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
RideX Admin
</div>

<ul class="nav-links">

<li>
<a href="admin-dashboard.html">
Dashboard
</a>
</li>

<li>
<a href="admin-customers.html">
Customers
</a>
</li>

<li>
<a href="admin-drivers.html">
Drivers
</a>
</li>

<li>
<a href="admin-analytics.html">
Analytics
</a>
</li>

</ul>

<div class="nav-actions">

<button class="theme-btn"
onclick="toggleTheme()">

<i class="fa-solid fa-moon"></i>

</button>

<button class="nav-btn"
onclick="logoutAdmin()">

Logout

</button>

</div>

</nav>

<section class="page-header">

<h1>
Customer Management
</h1>

<p>
Monitor all RideX customers and activities.
</p>

</section>

<!-- TOTAL CUSTOMERS -->

<section class="stats-grid">

<div class="stats-box">

<h2 id="totalCustomers">
0
</h2>

<p>
Total Customers
</p>

</div>

</section>

<!-- SEARCH -->

<section class="customer-search">

<div class="search-bar">

<i class="fa-solid fa-magnifying-glass"></i>

<input type="text"
id="searchInput"
placeholder="Search customers..."
onkeyup="searchCustomers()">

</div>

</section>

<!-- CUSTOMER GRID -->

<section class="customer-grid"
id="customerGrid">

</section>

<script>

let allCustomers = [];

// TOKEN VALIDATION

const token =
localStorage.getItem(
"token"
);

if(!token){

window.location.href =
"login.html";

}

// LOAD CUSTOMERS

async function loadCustomers(){

const user =
JSON.parse(
localStorage.getItem(
"loggedInUser"
)
);

if(
!user
||
user.role !== "ADMIN"
){

window.location.href =
"login.html";

return;

}

const response =
await fetch(

"http://localhost:8080/customers",

{
headers:{
"Authorization":
"Bearer " +
localStorage.getItem("token")
}
}

);

const users =
await response.json();

// REMOVE ADMINS

allCustomers =
users.filter(user =>

user.role !== "ADMIN"

);

// TOTAL CUSTOMERS

document.getElementById(
"totalCustomers"
).innerText =
allCustomers.length;

// RENDER

renderCustomers(allCustomers);

}

// RENDER

function renderCustomers(customers){

const grid =
document.getElementById(
"customerGrid"
);

grid.innerHTML = "";

if(customers.length === 0){

grid.innerHTML = `

<div class="no-active-ride">

<i class="fa-solid fa-users"></i>

<h3>
No Customers Found
</h3>

<p>
No matching customers available.
</p>

</div>

`;

return;

}

customers.forEach(customer => {

grid.innerHTML += `

<div class="customer-card">

<div class="customer-icon">

<i class="fa-solid fa-user"></i>

</div>

<h3>
${customer.fullName}
</h3>

<p>
${customer.email}
</p>

<div class="driver-details">

<span>

<i class="fa-solid fa-phone"></i>

${customer.phone}

</span>

<span>

<i class="fa-solid fa-location-dot"></i>

${customer.address ?? "Bangalore"}

</span>

</div>

<div class="admin-customer-status">

${customer.status}

</div>

</div>

`;

});

}

// SEARCH

function searchCustomers(){

const value =
document.getElementById(
"searchInput"
).value
.toLowerCase();

const filtered =
allCustomers.filter(customer =>

customer.fullName
.toLowerCase()
.includes(value)

||

customer.email
.toLowerCase()
.includes(value)

||

customer.phone
.includes(value)

);

renderCustomers(filtered);

}

// LOGOUT

function logoutAdmin(){

localStorage.removeItem(
"loggedInUser"
);

localStorage.removeItem(
"token"
);

window.location.href =
"login.html";

}

// LOAD

loadCustomers();

// LOAD THEME

if(
localStorage.getItem("theme")
=== "dark"
){

document.body.classList.add(
"dark-mode"
);

}

// TOGGLE THEME

function toggleTheme(){

document.body.classList.toggle(
"dark-mode"
);

if(
document.body.classList.contains(
"dark-mode"
)
){

localStorage.setItem(
"theme",
"dark"
);

}

else{

localStorage.setItem(
"theme",
"light"
);

}

}

</script>

</body>

</html>
