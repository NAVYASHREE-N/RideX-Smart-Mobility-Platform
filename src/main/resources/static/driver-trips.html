<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Driver Trips | RideX</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link rel="stylesheet"
href="css/style.css">

</head>

<body>

<nav class="navbar">

<div class="logo">
RideX Driver
</div>

<ul class="nav-links">

<li>
<a href="driver-dashboard.html">
Dashboard
</a>
</li>

<li>
<a href="driver-trips.html">
Trips
</a>
</li>

<li>
<a href="driver-earnings.html">
Earnings
</a>
</li>

</ul>

<button class="nav-btn"
onclick="logoutDriver()">

Logout

</button>

</nav>

<section class="page-header">

<h1>
Driver Trips
</h1>

<p>
View all completed and cancelled rides.
</p>

</section>

<section class="rides-grid"
id="tripsGrid">

</section>

<script>

const token =
localStorage.getItem(
"token"
);

if(!token){

window.location.href =
"login.html";

}

async function loadTrips(){

const driver =
JSON.parse(
localStorage.getItem(
"loggedInDriver"
)
);

if(!driver){

window.location.href =
"login.html";

return;

}

const response =
await fetch(

"http://localhost:8080/rides",

{
headers:{
"Authorization":
"Bearer " +
localStorage.getItem("token")
}
}

);

const rides =
await response.json();

const myTrips =
rides.filter(ride =>

ride.driver
&&
ride.driver.id === driver.id
&&
(
ride.status === "COMPLETED"
||
ride.status === "CANCELLED"
)

);

const grid =
document.getElementById(
"tripsGrid"
);

grid.innerHTML = "";

if(myTrips.length === 0){

grid.innerHTML = `

<div class="no-active-ride">

<i class="fa-solid fa-car-side"></i>

<h3>
No Trips Yet
</h3>

<p>
No completed or cancelled trips available.
</p>

</div>

`;

return;

}

myTrips.reverse().forEach(ride => {

grid.innerHTML += `

<div class="ride-history-card">

<div class="ride-top">

<h3>

${ride.pickupLocation}
→
${ride.dropLocation}

</h3>

<span class="ride-status">

${ride.status}

</span>

</div>

<div class="ride-details">

<p>

<i class="fa-solid fa-user"></i>

${ride.customer.fullName}

</p>

<p>

<i class="fa-solid fa-phone"></i>

${ride.customer.phone}

</p>

<p>

<i class="fa-solid fa-indian-rupee-sign"></i>

₹${ride.fare}

</p>

<p>

<i class="fa-solid fa-star"></i>

${ride.rating ?? "Pending"}

</p>

</div>

</div>

`;

});

}

function logoutDriver(){

localStorage.removeItem(
"loggedInDriver"
);

localStorage.removeItem(
"token"
);

window.location.href =
"login.html";

}

loadTrips();

// LOAD THEME

if(
localStorage.getItem("theme")
=== "dark"
){

document.body.classList.add(
"dark-mode"
);

}

// TOGGLE THEME

function toggleTheme(){

document.body.classList.toggle(
"dark-mode"
);

if(
document.body.classList.contains(
"dark-mode"
)
){

localStorage.setItem(
"theme",
"dark"
);

}

else{

localStorage.setItem(
"theme",
"light"
);

}

}

</script>

</body>

</html>
